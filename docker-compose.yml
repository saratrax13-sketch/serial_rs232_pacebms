services:
  pacebms:
    build:
      context: .
    container_name: pacebms-rs232-monitor
    restart: unless-stopped

    volumes:
      - ./data:/data

    devices:
      - "${PACEBMS_SERIAL_DEVICE:-/dev/ttyUSB0}:/dev/pacebms"

    ports:
      - "${PACEBMS_WEB_PORT:-8099}:8099"

    environment:
      PACEBMS_BMS_SERIAL: "/dev/pacebms"
      PACEBMS_BMS_BAUDRATE: "${PACEBMS_BMS_BAUDRATE:-9600}"
      PACEBMS_SCAN_INTERVAL: "${PACEBMS_SCAN_INTERVAL:-5}"
      PACEBMS_MQTT_HOST: "${PACEBMS_MQTT_HOST:-192.168.1.10}"
      PACEBMS_MQTT_PORT: "${PACEBMS_MQTT_PORT:-1883}"
      PACEBMS_MQTT_USER: "${PACEBMS_MQTT_USER:-YOUR_MQTT_USER}"
      PACEBMS_MQTT_PASSWORD: "${PACEBMS_MQTT_PASSWORD:-YOUR_MQTT_PASSWORD}"
      PACEBMS_MQTT_BASE_TOPIC: "${PACEBMS_MQTT_BASE_TOPIC:-pacebms}"
      PACEBMS_TELEGRAM_BOT_TOKEN: "${PACEBMS_TELEGRAM_BOT_TOKEN:-YOUR_TELEGRAM_BOT_TOKEN}"
      PACEBMS_TELEGRAM_CHAT_ID: "${PACEBMS_TELEGRAM_CHAT_ID:-YOUR_TELEGRAM_CHAT_ID}"
      PACEBMS_NOTIFY_ENABLED: "${PACEBMS_NOTIFY_ENABLED:-true}"
      PACEBMS_DEBUG_OUTPUT: "${PACEBMS_DEBUG_OUTPUT:-0}"
      PACEBMS_BATTERY_PROFILE: "${PACEBMS_BATTERY_PROFILE:-auto}"
      PACEBMS_EXPECTED_CELL_COUNT: "${PACEBMS_EXPECTED_CELL_COUNT:-0}"
      PACEBMS_EXPECTED_PACK_COUNT: "${PACEBMS_EXPECTED_PACK_COUNT:-0}"
      PACEBMS_CAPACITY_FALLBACK_ENABLED: "${PACEBMS_CAPACITY_FALLBACK_ENABLED:-false}"
      PACEBMS_CAPACITY_PER_PACK_AH: "${PACEBMS_CAPACITY_PER_PACK_AH:-0}"

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8099/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
