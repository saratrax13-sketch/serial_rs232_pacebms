name: "Pace BMS RS232 Monitor"
description: "Read-only Pace BMS RS232 to MQTT bridge with Home Assistant discovery and Telegram notifications"
version: "2.0.29"
slug: "pace_bms_rs232"
url: "https://github.com/saratrax13-sketch/serial_rs232_pacebms"
init: false

# Home Assistant Ingress web UI
ingress: true
ingress_port: 8099
panel_icon: mdi:battery-cog
panel_title: "Pace BMS"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

uart: true
usb: true

options:
  # ─────────────────────────────────────────────
  # Telegram
  # ─────────────────────────────────────────────
  telegram_bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  telegram_chat_id: "YOUR_TELEGRAM_CHAT_ID"

  # ─────────────────────────────────────────────
  # Notifications - Main Toggles
  # ─────────────────────────────────────────────
  notify_enabled: true
  notify_startup: true
  notify_disconnect: true
  notify_soc_low: true
  notify_soc_high: true
  notify_soh: true
  notify_warnings: true
  notify_warning_detail_enabled: true
  notify_fet: true
  notify_daily_summary: true
  notify_delta_report: true

  # ─────────────────────────────────────────────
  # Notifications - SOC / SOH
  # ─────────────────────────────────────────────
  notify_soc_low_thresholds: "75,50,25,10"
  notify_soc_high_threshold: 98
  notify_soc_high_reset: 95
  notify_soh_threshold: 95

  # ─────────────────────────────────────────────
  # Notifications - Disconnect
  # Recommended for serial connections: 1
  # ─────────────────────────────────────────────
  notify_retry_count: 1

  # ─────────────────────────────────────────────
  # Notifications - Warning Detail Reference Values
  # These are read-only reference values used only to enrich Telegram messages.
  # They do not write to or configure the BMS.
  # Pack high/low thresholds should be calculated from detected cell count.
  # Example: 4.20 V x 13 cells = 54.60 V
  # ─────────────────────────────────────────────
  notify_cell_high_warn_voltage: 4.20
  notify_cell_low_warn_voltage: 3.00
  notify_cell_delta_warn_mv: 100
  notify_temp_high_warn_c: 55
  notify_temp_low_warn_c: 0

  # ─────────────────────────────────────────────
  # Notifications - Warning Message Detail
  # ─────────────────────────────────────────────
  notify_include_all_cells_above_threshold: true
  notify_include_all_cells_below_threshold: true
  notify_include_highest_and_lowest_cell: true
  notify_include_pack_voltage: true
  notify_include_soc_soh: true

  # ─────────────────────────────────────────────
  # Notifications - FET Handling
  # ─────────────────────────────────────────────
  notify_ignore_charge_fet_off_when_full: true
  notify_alert_discharge_fet_off: true

  # ─────────────────────────────────────────────
  # Scheduled Reports
  # ─────────────────────────────────────────────
  notify_daily_summary_time: "19:00"
  notify_delta_report_time: "10:15"
  notify_delta_window_start: "00:00"
  notify_delta_window_end: "10:00"

  # ─────────────────────────────────────────────
  # MQTT
  # ─────────────────────────────────────────────
  mqtt_host: "192.168.10.16"
  mqtt_port: 1883
  mqtt_user: "YOUR_MQTT_USER"
  mqtt_password: "YOUR_MQTT_PASSWORD"
  mqtt_base_topic: "pacebms"
  mqtt_ha_discovery: true
  mqtt_ha_discovery_topic: "homeassistant"
  mqtt_retain_state: true
  state_force_republish_seconds: 300
  warn_force_republish_seconds: 300

  # ─────────────────────────────────────────────
  # BMS Connection
  # ─────────────────────────────────────────────
  connection_type: "Serial"
  bms_ip: "10.0.0.161"
  bms_port: 5000
  bms_serial: "/dev/serial/by-id/usb-Prolific_Technology_Inc._USB-Serial_Controller_D-if00-port0"
  bms_baudrate: 9600
  scan_interval: 5

  # ─────────────────────────────────────────────
  # Advanced
  # ─────────────────────────────────────────────
  debug_output: 0
  zero_pad_number_cells: 2
  zero_pad_number_packs: 2

schema:
  telegram_bot_token: password
  telegram_chat_id: str

  notify_enabled: bool
  notify_startup: bool
  notify_disconnect: bool
  notify_soc_low: bool
  notify_soc_high: bool
  notify_soh: bool
  notify_warnings: bool
  notify_warning_detail_enabled: bool
  notify_fet: bool
  notify_daily_summary: bool
  notify_delta_report: bool

  notify_soc_low_thresholds: str
  notify_soc_high_threshold: int
  notify_soc_high_reset: int
  notify_soh_threshold: int
  notify_retry_count: int

  notify_cell_high_warn_voltage: float
  notify_cell_low_warn_voltage: float
  notify_cell_delta_warn_mv: int
  notify_temp_high_warn_c: int
  notify_temp_low_warn_c: int

  notify_include_all_cells_above_threshold: bool
  notify_include_all_cells_below_threshold: bool
  notify_include_highest_and_lowest_cell: bool
  notify_include_pack_voltage: bool
  notify_include_soc_soh: bool

  notify_ignore_charge_fet_off_when_full: bool
  notify_alert_discharge_fet_off: bool

  notify_daily_summary_time: str
  notify_delta_report_time: str
  notify_delta_window_start: str
  notify_delta_window_end: str

  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  mqtt_base_topic: str
  mqtt_ha_discovery: bool
  mqtt_ha_discovery_topic: str
  mqtt_retain_state: bool
  state_force_republish_seconds: int
  warn_force_republish_seconds: int

  connection_type: list(IP|Serial)
  bms_ip: str
  bms_port: int
  bms_serial: str
  bms_baudrate: int
  scan_interval: int

  debug_output: int
  zero_pad_number_cells: int
  zero_pad_number_packs: int
